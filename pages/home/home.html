<div class="home-page-wrapper dashboard-page">
    <div class="section-header foldable-header" data-section="all-training">
        <div class="title-with-icon">
            <div class="section-icon training">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path
                        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z">
                    </path>
                </svg>
            </div>
            <div class="training-title-group">
                <h2 class="section-title" id="today-date-label">오늘의 제자훈련</h2>
            </div>
        </div>
        <div class="header-actions">
            <div id="today-date-range" class="goal-label"></div>
            <button class="btn-toggle-round btn-fold" id="btn-fold-all-training"
                onclick="toggleSection('all-training')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <div id="mini-status-all-training" class="mini-status-bar hidden">
        <div class="mini-status-group daily">
            <div class="mini-dot prayer" onclick="event.stopPropagation(); toggleTask('prayer')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path
                        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C15.09 3.81 16.76 3 18.5 3 21.58 3 24 5.42 24 8.5c0 3.78-3.4 6.86-8.55 11.18L12 21.35z">
                    </path>
                </svg>
            </div>
            <div class="mini-dot qt" onclick="event.stopPropagation(); toggleTask('qt')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
            </div>
            <div class="mini-dot reading" onclick="event.stopPropagation(); toggleTask('reading')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a4 4 0 0 0-4-4H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a4 4 0 0 1 4-4h6z"></path>
                </svg>
            </div>
        </div>
        <div class="mini-status-group weekly">
            <div class="mini-dot memorization" onclick="event.stopPropagation(); toggleTask('memorization')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <div class="mini-dot prep" onclick="event.stopPropagation(); toggleTask('prep')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
            </div>
            <div class="mini-dot phone" onclick="event.stopPropagation(); toggleTask('phone')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path
                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                    </path>
                </svg>
            </div>
        </div>
    </div>

    <div class="collapsible-content" id="grid-all-training">
        <!-- Weekly Calendar -->
        <div class="calendar-strip" id="main-calendar-strip">
            <!-- Injected via home.js -->
        </div>

        <div class="section-sub-header">
            <h3 class="section-sub-title">과제 미션</h3>
        </div>

        <section class="task-grid daily">
            <div class="task-item" id="card-prayer" onclick="toggleTask('prayer')" role="button">
                <div class="task-card-main">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path
                                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C15.09 3.81 16.76 3 18.5 3 21.58 3 24 5.42 24 8.5c0 3.78-3.4 6.86-8.55 11.18L12 21.35z">
                            </path>
                        </svg>
                    </div>
                    <div class="task-info">
                        <div class="task-title">기도</div>
                        <div id="task-prayer-duration" class="task-meta">매일 20분 이상</div>
                    </div>
                </div>
            </div>
            <div class="task-item" id="card-qt" onclick="toggleTask('qt')" role="button">
                <div class="task-card-main">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <div class="task-info">
                        <div class="task-title">QT</div>
                        <div class="task-meta">매일 말씀</div>
                    </div>
                </div>
            </div>
            <div class="task-item" id="card-reading" onclick="toggleTask('reading')" role="button">
                <div class="task-card-main">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a4 4 0 0 0-4-4H2z"></path>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a4 4 0 0 1 4-4h6z"></path>
                        </svg>
                    </div>
                    <div class="task-info">
                        <div class="task-title">성경통독</div>
                        <div class="task-meta">매일 통독</div>
                    </div>
                </div>
            </div>
        </section>
        <section class="task-grid weekly">
            <div class="task-item" id="card-memorization" onclick="toggleTask('memorization')" role="button">
                <div class="task-card-main">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <div class="task-info">
                        <div class="task-title">성구암송</div>
                        <div class="task-meta">주 1회</div>
                    </div>
                </div>
            </div>
            <div class="task-item" id="card-prep" onclick="toggleTask('prep')" role="button">
                <div class="task-card-main">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                    </div>
                    <div class="task-info">
                        <div class="task-title">교재 예습</div>
                        <div class="task-meta">주간 목표</div>
                    </div>
                </div>
            </div>
            <div class="task-item" id="card-phone" onclick="toggleTask('phone')" role="button">
                <div class="task-card-main">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                            </path>
                        </svg>
                    </div>
                    <div class="task-info">
                        <div class="task-title">전화교제</div>
                        <div class="task-meta">주 1회</div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Verse Selection Section -->
    <div class="section-header">
        <div class="title-with-icon">
            <div class="section-icon verse">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <h2 class="section-title">성구 암송</h2>
        </div>
        <div class="header-actions">
            <div class="week-selector">
                <button class="btn-toggle-round" onclick="prevHomeWeek()" aria-label="이전 주 구절 보기">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div id="home-selected-week" class="selected-week-badge">1</div>
                <button class="btn-toggle-round" onclick="nextHomeWeek()" aria-label="다음 주 구절 보기">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
            <button class="btn-toggle-round" id="btn-toggle-grid" onclick="toggleHomeWeekGrid()" aria-label="주간 목록 펼치기">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <div id="home-week-grid" class="mini-week-grid hidden">
        <!-- Week buttons injected here -->
    </div>

    <!-- 3D Verse Card -->
    <div class="verse-card-3d" onclick="window.toggleVerseCard(this)">
        <div class="verse-card-inner">
            <div class="verse-front">
                <h4 id="home-verse-subject">주제 로딩 중...</h4>
                <div class="verse-meta-row">
                    <span class="verse-ref" id="home-verse-ref-front">참조</span>
                </div>
                <p class="verse-content" id="home-verse-text-front" onclick="event.stopPropagation(); this.classList.toggle('concealed')">구절을 선택하세요</p>
                <div class="flip-hint">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <polyline points="23 20 23 14 17 14"></polyline>
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                    </svg>
                    탭하여 뒷면 보기
                </div>
            </div>
            <div class="verse-back">
                <h4 id="home-verse-subject-back">주제 로딩 중...</h4>
                <div class="verse-meta-row">
                    <span class="verse-ref" id="home-verse-ref-back">참조</span>
                </div>
                <p class="verse-content" id="home-verse-text-back" onclick="event.stopPropagation(); this.classList.toggle('concealed')">뒷면 내용</p>
                <div class="flip-hint">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <polyline points="1 4 1 10 7 10"></polyline>
                        <polyline points="23 20 23 14 17 14"></polyline>
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
                    </svg>
                    탭하여 앞면 보기
                </div>
            </div>
        </div>
    </div>
</div>
